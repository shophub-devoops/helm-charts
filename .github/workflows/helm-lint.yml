name: Helm Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Build chart dependencies
        run: |
          set -e
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          for chart in charts/*/; do
            if [ -f "$chart/Chart.lock" ]; then
              echo "::group::helm dependency build $chart"
              helm dependency build "$chart"
              echo "::endgroup::"
            fi
          done

      - name: Lint all charts
        run: |
          set -e
          for chart in charts/*/; do
            echo "::group::helm lint $chart"
            helm lint "$chart"
            echo "::endgroup::"
          done

      - name: Template all charts (sanity check)
        run: |
          set -e
          for chart in charts/*/; do
            name=$(basename "$chart")
            echo "::group::helm template demo $chart"
            helm template demo "$chart" --namespace "$name-system" > /dev/null
            echo "::endgroup::"
          done
