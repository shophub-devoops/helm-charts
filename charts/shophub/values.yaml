## ShopHub backend deployment values.

image:
  repository: docker.io/urospetraskovic/shophub-backend
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  port: 8080

# CloudNativePG Postgres for the users table (auth). The backend creates the
# schema on startup; we just provision an empty database here.
database:
  storageSize: 1Gi

# JWT signing secret. Leave empty to let the chart generate one and preserve it
# across upgrades (via lookup); set explicitly for a stable secret across
# reinstalls or to share across replicas in multi-cluster setups.
jwtSecret: ""

# Per-tenant Grafana access (spec 4.1 optional). When url is set, registration
# provisions a Grafana login scoped to the tenant's own org; the dashboard UI
# offers an "Open Grafana" link via externalUrl. Leave url empty to disable.
grafana:
  url: ""          # in-cluster Grafana API, e.g. http://kube-prometheus-stack-grafana.monitoring
  externalUrl: ""  # browser URL the tenant opens, e.g. http://grafana.localhost:8080
  adminUser: admin
  # Provide EITHER adminPassword (chart creates a Secret) OR existingSecret.
  adminPassword: ""
  existingSecret: ""
  passwordKey: admin-password

# ServiceMonitor registers the backend's /metrics with the (shared,
# kube-state-managed) kube-prometheus-stack — spec 3.3 "uses prometheus-stack".
serviceMonitor:
  enabled: true
  interval: 15s

# Optional bundled monitoring (spec 3.3 dependency). Off by default: the stack
# is installed cluster-wide via kube-state. Set enabled=true to pull it in as a
# subchart for a self-contained install.
kube-prometheus-stack:
  enabled: false
