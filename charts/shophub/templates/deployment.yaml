apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shophub.fullname" . }}
  labels:
    {{- include "shophub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shophub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shophub.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "shophub.serviceAccountName" . }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "shophub.fullname" . }}-db-app
                  key: uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shophub.fullname" . }}-jwt
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /probe/liveness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /probe/readiness
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
