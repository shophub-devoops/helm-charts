{{- if and .Values.grafana.url (not .Values.grafana.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shophub.fullname" . }}-grafana
  labels:
    {{- include "shophub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.grafana.passwordKey }}: {{ required "grafana.adminPassword or grafana.existingSecret is required when grafana.url is set" .Values.grafana.adminPassword | quote }}
{{- end }}
