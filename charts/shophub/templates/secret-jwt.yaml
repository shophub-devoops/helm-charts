{{- /*
JWT signing secret. Precedence: explicit .Values.jwtSecret > existing in-cluster
value (preserved across upgrades via lookup) > freshly generated. Generating
inline keeps tokens valid across `helm upgrade` instead of rotating every time.
*/ -}}
{{- $name := printf "%s-jwt" (include "shophub.fullname" .) -}}
{{- $secret := .Values.jwtSecret -}}
{{- if not $secret -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- if and $existing $existing.data -}}
{{- $secret = index $existing.data "jwt-secret" | b64dec -}}
{{- else -}}
{{- $secret = randAlphaNum 48 -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "shophub.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ $secret | quote }}
