## Default values for shop-operator chart.

image:
  # The shop-operator container image. Build with `make docker-build` in the
  # shop-operator repo, push to your registry, and set repository here.
  repository: docker.io/urospetraskovic/shop-operator-controller
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

# Override the chart name. Empty values let templates derive sensible defaults.
nameOverride: ""
fullnameOverride: ""

# Single replica is the supported configuration. Multi-replica needs
# leader election (set leaderElection: true) to avoid duplicate reconciles.
replicaCount: 1
leaderElection: false

# Image used for Shops that don't pin spec.image — the published unified Shop
# image (Go backend that also serves the storefront SPA). Override to your
# registry, e.g. docker.io/<you>/shop-backend:main.
shopImage: docker.io/urospetraskovic/shop-backend:0.2.0

# Storefront ingress. A Shop is exposed at <name>.<baseDomain>; urlPort is an
# optional ":port" appended to Status.URL when ingress is on a non-standard host
# port (e.g. ":8080" on k3d where traefik :80 maps to host :8080).
ingress:
  baseDomain: localhost
  urlPort: ""

# Per-tenant Grafana org provisioning (spec 4.1 optional). When url is set, the
# operator creates a Grafana Organization per tenant namespace and imports that
# tenant's Shop dashboard + datasources into it, so a ShopHub user sees only
# their own dashboards. Leave url empty to disable (org sync becomes a no-op).
grafana:
  url: ""
  adminUser: admin
  # Provide EITHER adminPassword (chart creates a Secret) OR existingSecret.
  adminPassword: ""
  existingSecret: ""
  passwordKey: admin-password
  # In-cluster datasource targets recreated inside each tenant org (their UIDs
  # must match the dashboard.json references).
  prometheusUrl: http://kube-prometheus-stack-prometheus.monitoring:9090
  lokiUrl: http://loki:3100

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  # Empty = derive from chart fullname.
  name: ""
  annotations: {}

# /metrics endpoint exposed by controller-runtime. Disable if you don't run
# Prometheus / don't want the Service in the cluster.
metricsService:
  enabled: true
  port: 8443

# Health probe endpoints (controller-runtime serves /healthz and /readyz on
# --health-probe-bind-address).
probes:
  liveness:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
