{{- /*
ConfigMap that ships the per-Shop Grafana dashboard. The kube-prometheus-stack
sidecar watches ConfigMaps cluster-wide with the `grafana_dashboard=1` label
and auto-imports any *.json key.

The dashboard uses a $shop variable (Prometheus `service` label) so one
dashboard covers every Shop tenant; the user picks a Shop from the dropdown.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shop-operator.fullname" . }}-dashboard-shop
  labels:
    {{- include "shop-operator.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  shop.json: |-
{{ .Files.Get "dashboards/shop.json" | indent 4 }}
