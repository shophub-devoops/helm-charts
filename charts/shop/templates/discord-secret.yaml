{{- if .Values.discord.webhookUrl }}
{{- /*
Discord webhook Secret the Shop references. The operator reads the
"webhook-url" key and routes this Shop's alerts there via an
AlertmanagerConfig. Normally a DiscordChannel CR produces this Secret; this
template is the manual-install shortcut.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shop.fullname" . }}-discord
  labels:
    {{- include "shop.labels" . | nindent 4 }}
type: Opaque
stringData:
  webhook-url: {{ .Values.discord.webhookUrl | quote }}
{{- end }}
